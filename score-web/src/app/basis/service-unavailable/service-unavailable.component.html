<section class="error-shell">
  <div class="error-layout">
    <div class="error-panel">
      <div class="status-chip">{{ statusCode }} · {{ eyebrow }}</div>
      <h1>{{ title }}</h1>
      <p class="lead">{{ message }}</p>
      <p class="support-copy">
        If the issue continues, verify that the gateway and backend services are running and reachable from this environment.
      </p>
    </div>
  </div>
</section>
