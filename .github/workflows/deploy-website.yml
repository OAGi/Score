name: Deploy website to GitHub Pages

on:
  push:
    branches: [gh-pages]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time; let an in-flight deployment finish
# so the site is never left half-published.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      # upload-pages-artifact v4+ drops hidden files from the artifact; the only
      # dotfile in the Docusaurus build is .nojekyll, which artifact-based Pages
      # deployments don't need (no Jekyll pass).
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
